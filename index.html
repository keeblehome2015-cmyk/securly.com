    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e2f;
            color: #ffffff;
            margin: 0;
            padding: 40px 20px;
            text-align: center;
        }
        h1 {
            font-size: 2.8rem;
            margin-bottom: 20px;
            text-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .header-actions {
            margin-bottom: 40px;
        }
        .download-btn {
            background-color: #4CAF50;
            color: white;
            padding: 12px 24px;
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 8px;
            transition: background-color 0.3s, transform 0.2s;
            display: inline-block;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .download-btn:hover {
            background-color: #45a049;
            transform: translateY(-2px);
        }
        .game-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .game-card {
            background-color: #2a2a40;
            border: 2px solid #3f3f5a;
            border-radius: 12px;
            padding: 20px 15px;
            width: 220px;
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .game-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.6);
            border-color: #7676ff;
        }
        .game-card a {
            text-decoration: none;
            color: #7676ff;
            font-size: 1.3rem;
            font-weight: bold;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .game-card:hover a {
            color: #a3a3ff;
        }
    </style>
</head>
