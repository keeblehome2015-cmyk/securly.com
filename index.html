<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Game Collection</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e2f;
            color: #ffffff;
            margin: 0;
            padding: 40px 20px;
            text-align: center;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 40px;
            text-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .game-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            max-width: 1000px;
            margin: 0 auto;
        }
        .game-card {
            background-color: #2a2a40;
            border: 2px solid #3f3f5a;
            border-radius: 12px;
            padding: 30px 20px;
            width: 200px;
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .game-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.6);
            border-color: #7676ff;
        }
        .game-card a {
            text-decoration: none;
            color: #7676ff;
            font-size: 1.3rem;
            font-weight: bold;
            width: 100%;
            height: 100%;
        }
        .game-card:hover a {
            color: #a3a3ff;
        }
    </style>
</head>
<body>

    <h1>My HTML5 Game Collection</h1>
    
    <div class="game-grid">
        <div class="game-card">
            <a href="War%20The%20Knights%20(2).html">War The Knights</a>
        </div>
        
        <div class="game-card">
            <a href="Hill%20Climb%20Racing%20Lite.html">Hill Climb Racing</a>
        </div>
        
        <div class="game-card">
            <a href="Ragdoll%20Archers.html">Ragdoll Archers</a>
        </div>
        
        <div class="game-card">
            <a href="Red%20Ball%204.html">Red Ball 4</a>
        </div>
        
        <div class="game-card">
            <a href="BitLife.html">BitLife</a>
        </div>
    </div>

</body>
</html>
