<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latin to English Translator</title>
    <style>
        :root {
            --primary: #4A148C;
            --secondary: #7B1FA2;
            --background: #f4f4f9;
            --text: #333;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            padding: 30px;
            width: 100%;
            max-width: 800px;
        }
        h1 {
            color: var(--primary);
            text-align: center;
            margin-bottom: 5px;
        }
        p.subtitle {
            text-align: center;
            color: #666;
            font-size: 0.9em;
            margin-bottom: 25px;
        }
        .flex-row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .io-box {
            flex: 1;
            min-width: 300px;
            display: flex;
            flex-direction: column;
        }
        label {
            font-weight: bold;
            margin-bottom: 8px;
            color: var(--primary);
        }
        textarea {
            width: 100%;
            height: 150px;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            resize: vertical;
            box-sizing: border-box;
        }
        textarea:focus {
            border-color: var(--secondary);
            outline: none;
        }
        .output-box {
            width: 100%;
            height: 150px;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 6px;
            background-color: #fafafa;
            font-size: 16px;
            overflow-y: auto;
            box-sizing: border-box;
            line-height: 1.5;
        }
        .button-container {
            text-align: center;
            margin: 20px 0;
        }
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        button:hover {
            background-color: var(--secondary);
        }
        .translated {
            color: var(--primary);
            font-weight: 500;
            border-bottom: 1px dashed var(--secondary);
            cursor: help;
        }
        .unknown {
            color: #d32f2f;
        }
        .legend {
            margin-top: 15px;
            font-size: 0.85em;
            color: #555;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Latin to English Translator</h1>
    <p class="subtitle">Based on the provided Cambridge Latin Course Dictionary</p>
    
    <div class="flex-row">
        <div class="io-box">
            <label for="latinInput">Latin Text:</label>
            <textarea id="latinInput" placeholder="Enter Latin text here (e.g., amicus agricola ambulat)"></textarea>
        </div>
        
        <div class="io-box">
            <label>English Translation:</label>
            <div id="englishOutput" class="output-box">Translation will appear here...</div>
        </div>
    </div>
    
    <div class="button-container">
        <button onclick="translateText()">Translate</button>
    </div>

    <div class="legend">
        <strong>Legend:</strong> 
        <span class="translated">Purple text</span> = Translated (hover to see original Latin word). 
        <span class="unknown">Red text</span> = Word not found in dictionary (due to unlisted conjugation/declension or missing entry).
    </div>
</div>

<script>
    // Dictionary extracted from the provided PDF document

        "amicus": "friend (male)",
        "amita": "aunt",

        "ager": "field",

        "alter": "the other",
        "altus": "high, deep",
        "aqua": "water",
        "aquaeductus": "aqueduct",
        "arca": "crate",
        "arcus": "arch",
        "ardenter": "eagerly",
        "ardeo": "burn",
        "arma": "arms, weapons",
        "artifex": "artist",
        "ascendo": "climb",

        "fortis": "brave",
        "forum": "forum",
        "frater": "brother",
        
        // Common grammatical forms to aid basic translation
        "est": "is",
        "sunt": "are",
        "erat": "was",
        "erant": "were",
        "in": "in/on",
        "non": "not",
        "sed": "but",
        "me": "me",
        "te": "you"
    };

    function cleanWord(word) {
        // Strip out punctuation so we can match the pure word
        return word.replace(/[.,!?;:()]/g, '').toLowerCase().trim();
    }

    function translateText() {
        const inputStr = document.getElementById("latinInput").value;
        const outputDiv = document.getElementById("englishOutput");
        
        if (!inputStr.trim()) {
            outputDiv.innerHTML = "<em>Please enter some text to translate.</em>";
            return;
        }

        // Split text by spaces to evaluate words, but keep original formatting if possible
        const lines = inputStr.split('\n');
        const translatedLines = lines.map(line => {
            const words = line.split(/\s+/);
            const translatedWords = words.map(word => {
                if (!word) return "";
                const clean = cleanWord(word);
                const translation = dictionary[clean];
                
                // Keep trailing punctuation to append after the span
                const punctuationMatch = word.match(/[.,!?;:()]+$/);
                const punctuation = punctuationMatch ? punctuationMatch[0] : "";
                
                if (translation) {
                    return `<span class="translated" title="Latin: ${clean}">${translation}</span>${punctuation}`;
                } else {
                    return `<span class="unknown">${word}</span>`;
                }
            });
            return translatedWords.join(" ");
        });

        outputDiv.innerHTML = translatedLines.join("<br>");
    }
</script>

</body>
</html>
